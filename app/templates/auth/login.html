{% extends 'common/layout.html' %}

{% block body %}
        <main class="mt-3 ms-2 me-2">
            <div class="row">

                      {%  with messages = get_flashed_messages() %}
                      {% if messages %}
                      <div class="alert alert-warning" role="alert">
                       <ul class =flashes>
                       {% for message in messages %}
                         <li>{{ message }}</li>
                       {% endfor %}
                       </ul>
                       </div>
                      {% endif %}
                      {% endwith %}

                <form action="/login" method="POST" style="width:100%;">
                  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                  <div class="col-xs-12">
                    <div class="mb-3">
                      <label for="username">{{_("Usuario:")}}</label>
                      <input class="form-control" id="username" name="username" placeholder="{{ _('Nome de usuario') }}">
                    </div>
                  </div>
                  <div class="col-xs-12">
                    <div class="mb-3">
                      <label for="password">{{_("Contrasinal:")}}</label>
                      <input type="password" class="form-control" id="password" name="password" placeholder="{{ _('Contrasinal') }}">
                    </div>
                  </div>
                  <div class="col-xs-12">
                    <button type="submit"  value="Iniciar sesion" class="btn btn-success w-100 btn-lg" name="login-button">{{_("Comezar sesión")}}</button>
                  </div>
                </form>
            </div>
        </main>
{% endblock body %}
