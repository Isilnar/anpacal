{% extends 'common/layout.html' %}

{% block css_styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles-management.css') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/plugins/monthSelect/style.css" integrity="sha384-iENKmnGeeAGTWfH/ajxq1dMSwLjASdk1v+taA112fikKow0tdV9cbUJcAiBEfHhG" crossorigin="anonymous"/>
{% endblock css_styles%}

{% block body %}
<div class="container-fluid mt-3 mb-3">
      <form action="/get_lunch_reports" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="d-flex flex-row align-items-start mb-3">
            <label for="dataDate" class="p-2 col-form-label">{{_('Mes/Ano')}}</label>
            <div class="col-md-4">
              <div class="input-group date" id="dataDate" name="dataDate" data-target-input="nearest">
                <input type="text" class="form-control datetimepicker-input" id="dataDateValue" name="dataDateValue" data-target="#date-from-date" data-input/>
                <div class="input-group-append" data-target="#dataDate" data-toggle="datetimepicker">
                  <div class="input-group-text"><i class="fa fa-calendar"></i></div>
                </div>
              </div>
            </div>
        </div>

        <div class="row mt-3">
          <button type="button" class="btn btn-warning w-100" id="healthTestButton" onclick="generateLunchReport()">{{_('Obter listaxe')}}</button>
          <button type="button" class="btn btn-primary w-100"  onclick="location.href='{{ url_for('main_bp.index') }}';">{{_("Saír")}}</button>
        </div>
        <input type="hidden" id="dataType" name="dataType">
      </form>
</div>

{% endblock body %}

{% block cur_navlink %}'nav-link-manage-lunchcare-reports'{% endblock cur_navlink%}

{% block js_script %}
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/plugins/monthSelect/index.js" integrity="sha384-6p33UqcS/7ZxiJzlAi3gfOsrVSlBlFNr/6gfN12AC0ETbTmPgMGSfHuN+H0QcWoO" crossorigin="anonymous"></script>
<script type="text/javascript">
    $(function () {
        flatpickr('#dataDate', {
            wrap: true, locale: window.FLATPICKR_LOCALE,
            plugins: [new monthSelectPlugin({dateFormat: 'm-Y', altFormat: 'm-Y'})]
        });
    });

    function generateLunchReport(){
        if (validateLunchcareReport()){
            console.log("Lanzamos report lunch...");

        let form1 = document.createElement("form");
        form1.setAttribute("id", "form123");
        form1.setAttribute("method", "POST");
        form1.setAttribute("action", "{{url_for('lunchcare_reports_bp.create_lunchcare_report_post')}}");

        let input1 = document.createElement("input");
        input1.setAttribute("id", "validFrom");
        input1.setAttribute("type", "text");
        input1.setAttribute("name", "validFrom");
        input1.setAttribute("value", $("#dataDateValue").val());
        input1.setAttribute("style", "display:none;");

        form1.appendChild(input1);
        form1.appendChild(csrfInput());

        document.body.appendChild(form1);
        form1.submit();

        }
    }

    function validateLunchcareReport(){
        let res = true;

        if ($("#dataDateValue").val() === ""){
            res = false;
            showError("dataDateValue", "Ten que escoller un mes-ano");
        }

        return res;
    }

</script>

{% endblock js_script%}
